<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Synapse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="header-content">
          <div class="brand">
            <div class="brand-mark">S</div>
            <h1>Synapse</h1>
          </div>
          <p id="summary">Initializing...</p>
        </div>
        <button id="clearButton" type="button" title="Clear all history">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
        </button>
      </header>

      <!-- Prompt Bar -->
      <div class="prompt-section">
        <form id="promptForm">
          <div class="prompt-input-wrap">
            <svg class="prompt-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
            <input id="promptInput" type="text" placeholder="What would you like to synthesize?" autocomplete="off" spellcheck="false">
            <button id="sendButton" type="submit" title="Send to Synapse">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
          <div class="prompt-hints">
            <span class="hint-chip">Compare by price</span>
            <span class="hint-chip">Summarize key points</span>
            <span class="hint-chip">Find trade-offs</span>
          </div>
        </form>
      </div>

      <main>
        <ol id="historyList" aria-label="Captured pages"></ol>
        <section id="emptyState" hidden>
          <div class="empty-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
              <polyline points="13 2 13 9 20 9"></polyline>
            </svg>
          </div>
          <p>No snapshots captured in the last 30 minutes.</p>
        </section>
      </main>

      <!-- Status toast -->
      <div id="statusToast" class="status-toast" hidden>
        <span id="toastMessage"></span>
      </div>
    </div>

    <template id="historyItemTemplate">
      <li class="history-card">
        <button class="entryButton" type="button">
          <div class="entry-header">
            <div class="entry-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
            <div class="entry-info">
              <span class="entryTitle"></span>
              <span class="entryUrl"></span>
            </div>
            <div class="entry-chevron">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
          </div>
          <div class="entry-footer">
            <span class="entryMeta"></span>
          </div>
        </button>
        <div class="dom-preview-container">
          <div class="preview-actions">
            <button class="copy-button" type="button" title="Copy extracted text">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              <span>Copy</span>
            </button>
          </div>
          <textarea class="domPreview" readonly spellcheck="false"></textarea>
        </div>
      </li>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
